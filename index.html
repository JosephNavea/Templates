<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Joseph%27s%20Templates%22,%22short_name%22:%22Templates%22,%22display%22:%22standalone%22,%22start_url%22:%22.%2F%22,%22background_color%22:%22%23f3f4f6%22,%22theme_color%22:%22%23111827%22}">
<title>Joseph's Message Templates</title>
<style>
:root {
  --bg:#f3f4f6; --card:#ffffff; --text:#111827; --muted:#6b7280;
  --border:#d1d5db; --button:#111827; --buttonText:#ffffff;
  --accent:#2563eb; --success:#166534; --input:#ffffff; --shadow:rgba(0,0,0,.06);
}
body.dark {
  --bg:#0f172a; --card:#111827; --text:#f9fafb; --muted:#9ca3af;
  --border:#374151; --button:#f9fafb; --buttonText:#111827;
  --accent:#60a5fa; --success:#86efac; --input:#1f2937; --shadow:rgba(0,0,0,.35);
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg);
  color:var(--text); transition:background .2s,color .2s;
}
.container { width:min(960px,92%); margin:0 auto; padding:24px 0 60px; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:6px; }
h1 { margin:0; font-size:clamp(1.7rem,5vw,2.4rem); }
.icon-btn {
  border:1px solid var(--border); background:var(--card); color:var(--text);
  border-radius:10px; padding:10px 12px; cursor:pointer; font-size:1rem;
}
.subtitle { color:var(--muted); margin:0 0 18px; }
.controls { display:grid; grid-template-columns:1fr auto; gap:10px; margin-bottom:18px; }
.search {
  width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:12px;
  background:var(--input); color:var(--text); font-size:1rem;
}
.filter-btn {
  border:1px solid var(--border); background:var(--card); color:var(--text);
  border-radius:12px; padding:0 14px; font-weight:700; cursor:pointer;
}
.filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
.category { margin-top:20px; }
.category-header {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  border:0; background:transparent; color:var(--text); padding:6px 0 10px;
  font-size:1.15rem; font-weight:700; cursor:pointer;
}
.template-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px; margin-bottom:14px; box-shadow:0 4px 14px var(--shadow);
}
.template-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.template-title { font-weight:700; line-height:1.35; }
.actions { display:flex; gap:8px; flex-shrink:0; }
.star-btn, .copy-btn {
  border:0; border-radius:9px; padding:9px 11px; cursor:pointer; font-weight:700;
}
.star-btn { background:transparent; color:var(--muted); border:1px solid var(--border); }
.star-btn.active { color:#f59e0b; }
.copy-btn { background:var(--button); color:var(--buttonText); }
.template-text { white-space:pre-wrap; line-height:1.52; color:var(--text); margin-top:12px; font-size:.98rem; }
.copied { color:var(--success); font-size:.9rem; min-height:18px; margin-top:7px; }
.hidden { display:none !important; }
.collapsed .cards-wrap { display:none; }
.modal-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex;
  align-items:flex-end; justify-content:center; padding:16px; z-index:20;
}
.modal {
  width:min(560px,100%); background:var(--card); color:var(--text);
  border-radius:18px 18px 10px 10px; padding:18px; max-height:90vh; overflow:auto;
}
.modal h3 { margin:0 0 6px; }
.modal p { color:var(--muted); margin:0 0 14px; }
.field { margin-bottom:12px; }
.field label { display:block; font-weight:700; margin-bottom:6px; font-size:.92rem; }
.field input {
  width:100%; padding:12px; border:1px solid var(--border); border-radius:10px;
  background:var(--input); color:var(--text); font-size:1rem;
}
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
.secondary, .primary {
  border:0; border-radius:10px; padding:11px 14px; font-weight:700; cursor:pointer;
}
.secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
.primary { background:var(--accent); color:white; }
.empty { text-align:center; color:var(--muted); padding:36px 10px; }
@media(max-width:560px) {
  .controls { grid-template-columns:1fr; }
  .filter-btn { padding:12px; }
  .template-header { gap:8px; }
  .actions { gap:6px; }
  .star-btn,.copy-btn { padding:8px 10px; }
}
</style>
</head>
<body>
<main class="container">
  <div class="topbar">
    <h1>Message Templates</h1>
    <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </div>
  <p class="subtitle">Search, personalize, and copy your leasing messages.</p>

  <div class="controls">
    <input id="searchInput" class="search" type="search" placeholder="Search templates...">
    <button id="favoritesFilter" class="filter-btn">☆ Favorites</button>
  </div>

  <div id="app"></div>
  <div id="emptyState" class="empty hidden">No templates found.</div>
</main>

<div id="modalBackdrop" class="modal-backdrop hidden">
  <div class="modal">
    <h3 id="modalTitle">Personalize Template</h3>
    <p>Fill in the fields below, then copy the completed message.</p>
    <div id="modalFields"></div>
    <div class="modal-actions">
      <button class="secondary" id="cancelModal">Cancel</button>
      <button class="primary" id="copyGenerated">Generate & Copy</button>
    </div>
  </div>
</div>

<script>
const templates = [{"id": "social-initial", "category": "Social Media", "title": "Initial Inquiry", "text": "Hi [Name], thank you for your interest in this apartment! It is currently available for the move-in date shown in the listing. Before scheduling a showing, could you please tell me your desired move-in date, approximate credit score, and monthly income?"}, {"id": "social-showing-time", "category": "Social Media", "title": "Offer a Showing Time", "text": "Thank you for confirming those details. I have an opening for a showing on [DAY] at [TIME]. Would that time work for you?"}, {"id": "social-contact", "category": "Social Media", "title": "Request Contact Information", "text": "Awesome! Could you please send me your email address and phone number so I can schedule the showing and send you a Google Calendar invite?"}, {"id": "social-later-date", "category": "Social Media", "title": "Unit Not Available Until a Later Date", "text": "Thank you for confirming those details. This unit will be available on [DATE]. Is your move-in date flexible?"}, {"id": "social-in-person", "category": "Social Media", "title": "In-Person Showing Scheduled", "text": "Great! I just scheduled the appointment, and you should receive the invite shortly."}, {"id": "social-virtual", "category": "Social Media", "title": "Virtual Showing Scheduled", "text": "Great! I just scheduled the appointment, and you should receive the invite shortly. For virtual showings, we usually use Google Meet, and you'll find the meeting link in the Google Calendar invite."}, {"id": "social-credit", "category": "Social Media", "title": "Does Not Meet Credit Requirement", "text": "Thank you for confirming those details. Unfortunately, this landlord has a strict minimum credit score requirement of 700 and does not accept co-signers."}, {"id": "sms-initial", "category": "SMS", "title": "Initial Inquiry", "text": "Hi [Name], this is Joseph with Fulton Grace Realty. I received your inquiry about the apartment at [ADDRESS]. Could you please confirm your desired move-in date, approximate credit score, and monthly income?"}, {"id": "sms-showing-time", "category": "SMS", "title": "Offer a Showing Time", "text": "Thank you for confirming those details. I have an opening for a showing on [DAY] at [TIME]. Would that time work for you?"}, {"id": "sms-credit", "category": "SMS", "title": "Does Not Meet Credit Requirement", "text": "Thank you for confirming those details. Unfortunately, this landlord has a strict minimum credit score requirement of 700 and does not accept co-signers."}, {"id": "general-signature", "category": "General", "title": "Listing Signature", "text": "Joseph Navea\nLeasing Agent\nAcqua Group | Fulton Grace Realty"}, {"id": "general-website", "category": "General", "title": "Offer Website", "text": "You're very welcome! If you'd like to continue your apartment search, feel free to visit www.josephnavea.com. Once you're there, click on \"Rent\" at the top of the page to filter your search based on your preferred neighborhood, budget, number of bedrooms, and other criteria.\n\nIf you find a property you're interested in, just let me know. I'd be happy to answer any questions or help you schedule a showing!"}];
const app = document.getElementById("app");
const searchInput = document.getElementById("searchInput");
const favoritesFilter = document.getElementById("favoritesFilter");
const themeToggle = document.getElementById("themeToggle");
const emptyState = document.getElementById("emptyState");
const modalBackdrop = document.getElementById("modalBackdrop");
const modalFields = document.getElementById("modalFields");
const modalTitle = document.getElementById("modalTitle");
const cancelModal = document.getElementById("cancelModal");
const copyGenerated = document.getElementById("copyGenerated");

let favoritesOnly = false;
let activeTemplate = null;
let favorites = new Set(JSON.parse(localStorage.getItem("templateFavorites") || "[]"));
let collapsed = JSON.parse(localStorage.getItem("collapsedCategories") || "{}");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  themeToggle.textContent = "☀️";
}

function placeholders(text) {
  return [...new Set((text.match(/\[[A-Z]+\]/g) || []).map(x => x.slice(1,-1)))];
}

function render() {
  const query = searchInput.value.toLowerCase().trim();
  app.innerHTML = "";
  let visibleCount = 0;

  const grouped = {};
  templates.forEach(t => {
    const matchesSearch = (t.title + " " + t.text + " " + t.category).toLowerCase().includes(query);
    const matchesFavorite = !favoritesOnly || favorites.has(t.id);
    if (!matchesSearch || !matchesFavorite) return;
    grouped[t.category] ??= [];
    grouped[t.category].push(t);
    visibleCount++;
  });

  Object.entries(grouped).forEach(([category, items]) => {
    const section = document.createElement("section");
    section.className = "category" + (collapsed[category] ? " collapsed" : "");

    const header = document.createElement("button");
    header.className = "category-header";
    header.innerHTML = `<span>${category}</span><span>${collapsed[category] ? "＋" : "−"}</span>`;
    header.onclick = () => {
      collapsed[category] = !collapsed[category];
      localStorage.setItem("collapsedCategories", JSON.stringify(collapsed));
      render();
    };

    const wrap = document.createElement("div");
    wrap.className = "cards-wrap";

    items.forEach(t => {
      const card = document.createElement("article");
      card.className = "template-card";
      const starred = favorites.has(t.id);
      card.innerHTML = `
        <div class="template-header">
          <div class="template-title">${t.title}</div>
          <div class="actions">
            <button class="star-btn ${starred ? "active" : ""}" aria-label="Favorite">${starred ? "★" : "☆"}</button>
            <button class="copy-btn">Copy</button>
          </div>
        </div>
        <div class="template-text">${escapeHtml(t.text)}</div>
        <div class="copied"></div>
      `;

      card.querySelector(".star-btn").onclick = () => {
        if (favorites.has(t.id)) favorites.delete(t.id); else favorites.add(t.id);
        localStorage.setItem("templateFavorites", JSON.stringify([...favorites]));
        render();
      };

      card.querySelector(".copy-btn").onclick = () => openTemplate(t, card);
      wrap.appendChild(card);
    });

    section.appendChild(header);
    section.appendChild(wrap);
    app.appendChild(section);
  });

  emptyState.classList.toggle("hidden", visibleCount !== 0);
}

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
}

function openTemplate(template, card) {
  const vars = placeholders(template.text);
  if (vars.length === 0) {
    copyText(template.text, card.querySelector(".copied"));
    return;
  }
  activeTemplate = {template, card};
  modalTitle.textContent = template.title;
  modalFields.innerHTML = "";
  vars.forEach(v => {
    const div = document.createElement("div");
    div.className = "field";
    div.innerHTML = `<label>${v.charAt(0) + v.slice(1).toLowerCase()}</label><input data-key="${v}" placeholder="${v.charAt(0) + v.slice(1).toLowerCase()}">`;
    modalFields.appendChild(div);
  });
  modalBackdrop.classList.remove("hidden");
  const first = modalFields.querySelector("input");
  if (first) setTimeout(() => first.focus(), 50);
}

async function copyText(text, messageEl) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); ta.remove();
  }
  if (messageEl) {
    messageEl.textContent = "Copied!";
    setTimeout(() => messageEl.textContent = "", 1800);
  }
}

copyGenerated.onclick = async () => {
  if (!activeTemplate) return;
  let text = activeTemplate.template.text;
  modalFields.querySelectorAll("input").forEach(input => {
    const key = input.dataset.key;
    const value = input.value.trim() || `[${key}]`;
    text = text.replaceAll(`[${key}]`, value);
  });
  await copyText(text, activeTemplate.card.querySelector(".copied"));
  modalBackdrop.classList.add("hidden");
};

cancelModal.onclick = () => modalBackdrop.classList.add("hidden");
modalBackdrop.onclick = e => { if (e.target === modalBackdrop) modalBackdrop.classList.add("hidden"); };

searchInput.addEventListener("input", render);
favoritesFilter.onclick = () => {
  favoritesOnly = !favoritesOnly;
  favoritesFilter.classList.toggle("active", favoritesOnly);
  favoritesFilter.textContent = favoritesOnly ? "★ Favorites" : "☆ Favorites";
  render();
};

themeToggle.onclick = () => {
  document.body.classList.toggle("dark");
  const dark = document.body.classList.contains("dark");
  localStorage.setItem("theme", dark ? "dark" : "light");
  themeToggle.textContent = dark ? "☀️" : "🌙";
};

render();
</script>
</body>
</html>
